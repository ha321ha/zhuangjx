cat << 'EOF' | kubectl apply -n ccs-sit -f -

# ============================================================
# SeaTunnel Web — 前端资源（ConfigMap + Deployment + Service + Ingress）
# ============================================================
# 使用方式（Rancher Kubectl Shell，一条 heredoc 命令即可部署）：
#   cat << 'EOF' | kubectl apply -n ccs-sit -f -
#   <粘贴本文件全部内容>
#   EOF
#
# 反代目标 seatunnel-web-backend:8801 为同命名空间 Service，与后端同处 ccs-sit。
#
# 【需要修改的地方已用 ===> 标记（镜像 tag、Ingress 域名等）】
# ============================================================

---
# ── ConfigMap：前端 Nginx 配置 ────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: seatunnel-web-frontend-configs
  labels:
    app.kubernetes.io/name: seatunnel-web-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/instance: seatunnel-web
data:
  default.conf: |
    server {
        listen       80;
        server_name  localhost;

        # ── 根路径重定向到前端 /ui/ ──
        location = / {
            return 301 /ui/;
        }

        # ── 前端静态文件（vite base='/ui/'）──
        location /ui/ {
            alias   /usr/share/nginx/html/ui/;
            index  index.html index.htm;
            try_files $uri $uri/ /ui/index.html;
        }

        # ── API 反向代理到后端 ─────────────────────────────
        # 将前端发起的 API 请求代理到后端 Service
        location /seatunnel/ {
            # ===> 修改为后端 Service 的名称和端口，格式：http://<service-name>:<port>/
            proxy_pass http://seatunnel-web-backend.ccs-sit.svc.cluster.local:8801;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }

---
# ── Deployment：前端 ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seatunnel-web-frontend
  labels:
    app.kubernetes.io/name: seatunnel-web-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/instance: seatunnel-web
spec:
  # ===> 按需调整副本数
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: seatunnel-web-frontend
      app.kubernetes.io/component: frontend
      app.kubernetes.io/instance: seatunnel-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seatunnel-web-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/instance: seatunnel-web
    spec:
      # ===> 如需从私有仓库拉取镜像，取消注释并配置 imagePullSecrets
      imagePullSecrets:
          - name: mc-registry-secret
      containers:
        - name: seatunnel-web-frontend
          # ===> 【必须修改】替换为你的前端镜像地址
          image: reg.meicloud.com:40443/ccs-std/sit/seatunnel-web-pc:meiqing-V4.0.0.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Shanghai
          volumeMounts:
            - mountPath: /etc/nginx/conf.d/default.conf
              name: nginx-config
              subPath: default.conf
          # ── 启动探针 ──────────────────────────────────────
          startupProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 30
          # ── 存活探针 ──────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            # ===> 按需调整资源配置
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: nginx-config
          configMap:
            name: seatunnel-web-frontend-configs

---
# ── Service：前端 ────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: seatunnel-web-frontend
  labels:
    app.kubernetes.io/name: seatunnel-web-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/instance: seatunnel-web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: seatunnel-web-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/instance: seatunnel-web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80

---
# ── Ingress ──────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seatunnel-web-ingress
  labels:
    app.kubernetes.io/name: seatunnel-web-ingress
    app.kubernetes.io/component: frontend
    app.kubernetes.io/instance: seatunnel-web
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
    # ===> 【必须修改】替换为你的 Ingress 域名
    - host: seatunnel-web.meicloud.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seatunnel-web-frontend
                port:
                  number: 80
  # ===> 如需配置 TLS，取消注释并配置 secretName
  # tls:
  #   - hosts:
  #       - seatunnel-web.meicloud.com
  #     secretName: seatunnel-web-tls

EOF